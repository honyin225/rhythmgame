<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Game</title>
    <style>
        /* === GLOBAL RESET === */
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            margin: 16px;
        }

        .game-wrapper {
            background: #1e1e1e;
            border-radius: 24px;
            padding: 24px;
            border: 2px solid #aaa;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            width: fit-content;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            min-height: 44px;
        }

        .game-row {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .play-area {
            position: relative;
            width: 600px;
            height: 320px;
            background: #0f0f0f;
            border-radius: 20px;
            border: 3px solid #777;
            box-shadow: inset 0 0 15px #000;
            overflow: hidden;
        }

        .row-guide {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: #444;
            border-top: 1px solid #666;
            border-bottom: 1px solid #333;
            pointer-events: none;
            z-index: 2;
        }
        .row1 { top: 40px; }
        .row2 { top: 120px; }
        .row3 { top: 200px; }
        .row4 { top: 280px; }

        .hit-zone {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 60px;
            background: rgba(150,150,150,0.15);
            border-left: 4px solid #aaa;
            border-right: 4px solid #aaa;
            z-index: 5;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hit-zone::after {
            content: "HIT";
            color: #ccc;
            font-weight: bold;
            font-size: 0.9rem;
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid #888;
        }

        #notes-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .note {
            position: absolute;
            height: 34px;
            width: 120px;
            border-radius: 20px 4px 4px 20px;
            background: #3a3a3a;
            border: 2px solid #bbb;
            box-shadow: 0 5px 0 #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            transition: left 0.03s linear;
            z-index: 20;
        }
        .note::after {
            content: "▶";
            margin-left: 4px;
            color: #ccc;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100px;
        }

        .lane-btn {
            width: 90px;
            height: 70px;
            border-radius: 16px;
            background: #2a2a2a;
            border: 3px solid #888;
            box-shadow: 0 6px 0 #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: #eee;
            cursor: pointer;
            transition: 0.05s;
            line-height: 1.1;
        }
        .lane-btn.active-press {
            background: #5a5a5a;
            transform: scale(0.98);
        }
        .lane-btn.ready {
            background: #4a4a4a;
            border-color: #fff;
        }

        .control-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }
        
        /* Base button style */
        .control-btn {
            background: #2a2a2a;
            border: 2px solid #888;
            color: #eee;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 24px;
            border-radius: 50px;
            box-shadow: 0 5px 0 #0f0f0f;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1px;
            min-width: 100px;
        }
        .control-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0f0f0f;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="top-bar"></div>
    <div class="game-row">
        <div class="play-area">
            <div class="row-guide row1"></div>
            <div class="row-guide row2"></div>
            <div class="row-guide row3"></div>
            <div class="row-guide row4"></div>
            <div class="hit-zone"></div>
            <div id="notes-container"></div>
        </div>
        <div class="right-panel">
            <div class="lane-btn ready" id="btn1">1</div>
            <div class="lane-btn ready" id="btn2">2</div>
            <div class="lane-btn ready" id="btn3">3</div>
            <div class="lane-btn ready" id="btn4">4</div>
        </div>
    </div>
    <div class="control-bar">
        <button class="control-btn" id="startBtn">▶ START</button>
        <button class="control-btn" id="pauseBtn">⏸ PAUSE</button>
    </div>
</div>

<script>
    (function() {
        // === CONSTANTS ===
        const HIT_ZONE_LEFT = 540;
        const HIT_ZONE_RIGHT = 600;
        const NOTE_WIDTH = 120;
        const NOTE_HEIGHT = 34;
        const SPAWN_INTERVAL = 650;
        const SCROLL_SPEED = 2.6;
        const LANE_COOLDOWN = 2000;
        const LANE_CENTERS = [40, 120, 200, 280];

        // === GAME STATE ===
        let notes = [];
        let gameActive = false;
        let gamePaused = false;
        let gameOver = false;
        let spawnTimer = null;
        let animFrame = null;
        let lastSpawnTime = [0, 0, 0, 0];

        // === DOM ELEMENTS ===
        const notesDiv = document.getElementById('notes-container');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const laneBtns = [
            document.getElementById('btn1'),
            document.getElementById('btn2'),
            document.getElementById('btn3'),
            document.getElementById('btn4')
        ];

        // === HELPER: Check lane cooldown ===
        function isLaneReady(lane) {
            const now = Date.now();
            if (lastSpawnTime[lane] === 0) return true;
            return (now - lastSpawnTime[lane]) >= LANE_COOLDOWN;
        }

        // === CORE MECHANIC: Hit detection ===
        function triggerLane(lane) {
            if (!gameActive || gamePaused || gameOver) return;

            laneBtns[lane].classList.add('active-press');
            setTimeout(() => laneBtns[lane].classList.remove('active-press'), 120);

            let bestIndex = -1;
            let bestDistance = Infinity;

            for (let i = 0; i < notes.length; i++) {
                const n = notes[i];
                if (n.lane !== lane) continue;

                const rightEdge = n.left + n.width;
                if (n.left <= HIT_ZONE_RIGHT && rightEdge >= HIT_ZONE_LEFT) {
                    const center = n.left + n.width / 2;
                    const targetCenter = (HIT_ZONE_LEFT + HIT_ZONE_RIGHT) / 2;
                    const distance = Math.abs(center - targetCenter);

                    if (distance < bestDistance) {
                        bestDistance = distance;
                        bestIndex = i;
                    }
                }
            }

            if (bestIndex !== -1) {
                notes[bestIndex].element.remove();
                notes.splice(bestIndex, 1);
            }
        }

        // === NOTE SPAWNING ===
        function createNote() {
            if (!gameActive || gamePaused || gameOver) return;

            const now = Date.now();
            const availableLanes = [];

            for (let i = 0; i < 4; i++) {
                if (isLaneReady(i)) availableLanes.push(i);
            }

            if (availableLanes.length === 0) return;

            const lane = availableLanes[Math.floor(Math.random() * availableLanes.length)];

            const element = document.createElement('div');
            element.className = 'note';
            element.setAttribute('data-lane', lane);
            element.style.left = '-70px';
            element.style.top = (LANE_CENTERS[lane] - NOTE_HEIGHT / 2) + 'px';

            notesDiv.appendChild(element);
            notes.push({
                element: element,
                lane: lane,
                left: -NOTE_WIDTH,
                width: NOTE_WIDTH
            });

            lastSpawnTime[lane] = now;
        }

        // === UPDATE LOOP ===
        function updateNotePositions() {
            if (!gameActive || gamePaused || gameOver) return;

            for (let i = notes.length - 1; i >= 0; i--) {
                const note = notes[i];
                note.left += SCROLL_SPEED;
                note.element.style.left = note.left + 'px';

                if (note.left > HIT_ZONE_RIGHT) {
                    note.element.remove();
                    notes.splice(i, 1);
                }
            }
        }

        // === ANIMATION LOOP ===
        function animationLoop() {
            if (!gameActive) return;
            updateNotePositions();
            animFrame = requestAnimationFrame(animationLoop);
        }

        // === LANE BUTTON HANDLER ===
        function handleButtonClick(index) {
            if (gameActive && !gamePaused && !gameOver) {
                triggerLane(index);
            }
        }

        laneBtns[0].addEventListener('click', () => handleButtonClick(0));
        laneBtns[1].addEventListener('click', () => handleButtonClick(1));
        laneBtns[2].addEventListener('click', () => handleButtonClick(2));
        laneBtns[3].addEventListener('click', () => handleButtonClick(3));

        // === KEYBOARD SUPPORT ===
        window.addEventListener('keydown', (e) => {
            if (!gameActive || gamePaused || gameOver) return;

            let lane = -1;
            if (e.key === '1') lane = 0;
            else if (e.key === '2') lane = 1;
            else if (e.key === '3') lane = 2;
            else if (e.key === '4') lane = 3;
            else return;

            e.preventDefault();
            triggerLane(lane);
        });

        // === START GAME ===
        function startGame() {
            if (gameActive) return;

            notes.forEach(n => n.element.remove());
            notes = [];
            
            gameActive = true;
            gamePaused = false;
            gameOver = false;
            lastSpawnTime = [0, 0, 0, 0];

            spawnTimer = setInterval(createNote, SPAWN_INTERVAL);
            animationLoop();
        }

        // === TOGGLE PAUSE ===
        function pauseGame() {
            if (!gameActive || gameOver) return;
            gamePaused = true;  // Always pause when button is clicked
        }

        function resumeGame() {
            if (!gameActive || gameOver) return;
            gamePaused = false;  // Always resume when Play is clicked
        }

        // === EVENT LISTENERS ===
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);
        startBtn.addEventListener('click', function() {
            if (gameActive && gamePaused) {
                resumeGame();
            }
        });

        // === INITIAL STYLING ===
        for (let i = 0; i < 4; i++) {
            laneBtns[i].classList.add('ready');
        }
    })();
</script>
</body>
</html>
